spring:
  application:
    name: plannr-server
  docker:
    compose:
      lifecycle-management: start_and_stop
  r2dbc:
    url: r2dbc:postgresql://${plannr.database.host}:${plannr.database.port}/${plannr.database.name}
    username: ${plannr.database.username}
    password: ${plannr.database.password}
  flyway:
    url: jdbc:postgresql://${plannr.database.host}:${plannr.database.port}/${plannr.database.name}
    user: ${plannr.database.username}
    password: ${plannr.database.password}
plannr:
  database:
    host: ${PLANNR_DB_HOST:localhost}
    port: ${PLANNR_DB_PORT:5432}
    name: ${PLANNR_DB_NAME:plannr}
    username: ${PLANNR_DB_USERNAME:plannr}
    password: ${PLANNR_DB_PASSWORD:plannr}
  projections:
    dirty-scope-delay-ms: 30000
    full-rebuild-delay-ms: 3600000
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health
  health:
    db:
      enabled: false
