spring:
  application:
    name: plannr-server
  docker:
    compose:
      lifecycle-management: start_and_stop
  r2dbc:
    url: ${SPRING_R2DBC_URL:r2dbc:postgresql://localhost:5432/plannr}
    username: ${SPRING_R2DBC_USERNAME:${SPRING_DB_USERNAME:plannr}}
    password: ${SPRING_R2DBC_PASSWORD:${SPRING_DB_PASSWORD:plannr}}
  flyway:
    url: ${SPRING_FLYWAY_URL:${SPRING_DATASOURCE_URL:${SPRING_JDBC_URL:jdbc:postgresql://localhost:5432/plannr}}}
    user: ${SPRING_FLYWAY_USER:${SPRING_DATASOURCE_USERNAME:${SPRING_DB_USERNAME:plannr}}}
    password: ${SPRING_FLYWAY_PASSWORD:${SPRING_DATASOURCE_PASSWORD:${SPRING_DB_PASSWORD:plannr}}}
plannr:
  projections:
    dirty-scope-delay-ms: 30000
    full-rebuild-delay-ms: 3600000
management:
  endpoint:
    health:
      show-details: always
  endpoints:
    web:
      exposure:
        include: health
  health:
    db:
      enabled: false
